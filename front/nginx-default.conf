server {
    listen       80;
    server_name  localhost;
    root   /usr/share/nginx/html;

    # Proxy API requests to GraphQL backend (same-origin = no CORS/cookie issues)
    location /graphql {
        proxy_pass http://graphql:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(login|authorize|logout|feed|community|authorization-code|version|nakala) {
        proxy_pass http://graphql:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /events {
        proxy_pass http://graphql:3030;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://graphql:3030;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Asset upload/download (images, exports). The graphql service exposes
    # /assets/images and /assets/exports; without this proxy block, requests
    # silently fall through to the SPA's index.html and uploads quietly fail.
    #
    # IMPORTANT: this MUST be a narrow regex match, not `location /assets`.
    # Vite emits the SPA bundle under /usr/share/nginx/html/assets/*, so a
    # broad `/assets` block would send /assets/index-*.js to graphql and
    # break the whole frontend.
    location ~ ^/assets/(images|exports)(/|$) {
        proxy_pass http://graphql:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Stream multipart upload bodies straight to graphql instead of
        # buffering the whole file in nginx first.
        proxy_request_buffering off;
        # Match graphql's STORAGE_MAX_UPLOAD_BYTES default (25 MiB) with a
        # little headroom for multipart framing.
        client_max_body_size 32m;
    }

    location / {
        try_files $uri /index.html;
        index  index.html;
    }

    # `index.html` references hashed Vite chunk filenames. If the browser
    # caches a stale `index.html` alongside a stale 404 for a chunk URL it
    # references, the SPA hard-fails until the cache is manually cleared
    # (this exact thing just bit us). Fetch fresh every time — the file is
    # tiny.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }
}
