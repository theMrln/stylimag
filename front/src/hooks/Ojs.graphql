#import './Corpus.graphql'

query getOjsInstances {
  ojsInstances
}

query getOjsIssues($instance: OjsInstance!) {
  ojsIssues(instance: $instance) {
    id
    title
    description
    datePublished
    year
    vol
    number
  }
}

mutation importCorpusFromOJS(
  $issueId: Int!
  $workspaceId: ID
  $instance: OjsInstance!
) {
  importCorpusFromOJS(
    issueId: $issueId
    workspaceId: $workspaceId
    instance: $instance
  ) {
    ...basicCorpusFields
  }
}

mutation pushArticleMetadataToOJS(
  $articleId: ID!
  $instance: OjsInstance
) {
  pushArticleMetadataToOJS(articleId: $articleId, instance: $instance)
}

mutation pushCorpusArticleOrderToOJS(
  $corpusId: ID!
  $instance: OjsInstance
) {
  pushCorpusArticleOrderToOJS(corpusId: $corpusId, instance: $instance)
}
